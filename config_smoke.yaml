dataset:
  name: AbstractTTS/IEMOCAP
  train_split: train
  validation_split: validation
  test_split: test
  validation_size: 0.1
  test_size: 0.1
  seed: 42
  num_proc: 1
  max_train_samples: 16
  max_validation_samples: 8
  max_test_samples: 8

audio:
  sampling_rate: 16000
  max_duration_seconds: 4.0

model:
  encoder_name: microsoft/wavlm-base
  pooling: mean
  freeze_encoder: true
  dropout: 0.2
  hidden_dim: 128

training:
  output_dir: outputs/ser_baseline_smoke
  batch_size: 2
  eval_batch_size: 2
  learning_rate: 0.0001
  weight_decay: 0.01
  epochs: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  num_workers: 0
  device: auto

inference:
  checkpoint_path: outputs/ser_baseline_smoke/best.pt
