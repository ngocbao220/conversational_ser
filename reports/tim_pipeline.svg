<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">WavLM plus TIM pipeline</title>
  <desc id="desc">Temporal interaction memory pipeline using causal temporal features.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.6; rx: 9; }
      .blue { fill: #e0f2fe; stroke: #0369a1; }
      .yellow { fill: #fef3c7; stroke: #b45309; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .red { fill: #fee2e2; stroke: #b91c1c; }
      .muted { fill: #f8fafc; stroke: #cbd5e1; stroke-dasharray: 6 5; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #18212f; font-size: 16px; font-weight: 700; }
      .small { font-size: 13px; font-weight: 500; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="360"/>
  <rect class="box blue" x="42" y="74" width="150" height="60"/><text class="text" x="72" y="99">WavLM</text><text class="small" x="65" y="121">mean embedding h</text>
  <rect class="box green" x="42" y="205" width="150" height="70"/><text class="text" x="71" y="231">Causal</text><text class="text" x="55" y="252">temporal τ</text>
  <rect class="box green" x="250" y="205" width="165" height="70"/><text class="text" x="292" y="231">Temporal</text><text class="text" x="306" y="252">MLP</text>
  <rect class="box" x="480" y="119" width="155" height="68"/><text class="text" x="516" y="145">Concat</text><text class="small" x="503" y="167">[h, temporal_emb]</text>
  <rect class="box yellow" x="700" y="119" width="160" height="68"/><text class="text" x="732" y="145">TIM memory</text><text class="small" x="726" y="167">read-before-write</text>
  <rect class="box" x="700" y="244" width="160" height="58"/><text class="text" x="738" y="268">GRU update</text><text class="small" x="731" y="289">state for next turn</text>
  <rect class="box" x="910" y="119" width="115" height="68"/><text class="text" x="930" y="145">Residual</text><text class="small" x="932" y="167">+ classifier</text>
  <rect class="box red" x="910" y="244" width="115" height="58"/><text class="text" x="943" y="278">Label</text>
  <path class="arrow" d="M192 104 C305 104, 370 126, 480 146"/>
  <path class="arrow" d="M192 240 H250"/><path class="arrow" d="M415 240 C445 240, 445 172, 480 162"/>
  <path class="arrow" d="M635 153 H700"/><path class="arrow" d="M860 153 H910"/><path class="arrow" d="M968 187 V244"/>
  <path class="arrow" d="M780 187 V244"/>
  <rect class="box muted" x="250" y="315" width="775" height="34"/>
  <text class="small" x="276" y="337">τ uses current utterance timing + previous utterance/speaker history only; stats normalized from train split only.</text>
</svg>
