<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="320" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">WavLM plus MAL pipeline</title>
  <desc id="desc">Dialogue memory pipeline using zero temporal vector.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.6; rx: 9; }
      .blue { fill: #e0f2fe; stroke: #0369a1; }
      .yellow { fill: #fef3c7; stroke: #b45309; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .red { fill: #fee2e2; stroke: #b91c1c; }
      .muted { fill: #f8fafc; stroke: #cbd5e1; stroke-dasharray: 6 5; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #18212f; font-size: 16px; font-weight: 700; }
      .small { font-size: 13px; font-weight: 500; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="320"/>
  <rect class="box blue" x="42" y="72" width="155" height="62"/><text class="text" x="74" y="98">WavLM</text><text class="small" x="66" y="120">mean embedding</text>
  <rect class="box green" x="42" y="185" width="155" height="54"/><text class="text" x="74" y="218">Zero τ</text>
  <rect class="box yellow" x="270" y="72" width="160" height="62"/><text class="text" x="302" y="98">Project</text><text class="small" x="298" y="120">W_in(h) + W_tau(0)</text>
  <rect class="box yellow" x="505" y="72" width="170" height="62"/><text class="text" x="538" y="98">Read memory</text><text class="small" x="528" y="120">uses previous state</text>
  <rect class="box yellow" x="505" y="185" width="170" height="62"/><text class="text" x="535" y="211">Update GRU</text><text class="small" x="527" y="233">after prediction read</text>
  <rect class="box" x="748" y="72" width="170" height="62"/><text class="text" x="778" y="98">Residual fuse</text><text class="small" x="770" y="120">h + tanh(alpha) m</text>
  <rect class="box red" x="982" y="72" width="100" height="62"/><text class="text" x="1005" y="107">Label</text>
  <path class="arrow" d="M197 103 H270"/><path class="arrow" d="M430 103 H505"/><path class="arrow" d="M675 103 H748"/><path class="arrow" d="M918 103 H982"/>
  <path class="arrow" d="M197 212 C245 212, 245 126, 270 126"/>
  <path class="arrow" d="M590 134 V185"/>
  <path class="arrow" d="M675 216 C720 216, 720 132, 748 132"/>
  <rect class="box muted" x="270" y="266" width="648" height="36"/>
  <text class="small" x="295" y="289">Dialogue boundary: state reset. Causality: read-before-write, no future utterance, no real timing feature.</text>
</svg>
