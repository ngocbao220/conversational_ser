experiment_name: wavlm_baseline_no_mal_no_tim
output_dir: results/wavlm_baseline_no_mal_no_tim
seed: 42

dataset:
  iemocap_root: iemocap
  auto_download: true
  kaggle_dataset: sangayb/iemocap
  test_session: 5
  validation_ratio: 0.1
  sampling_rate: 16000
  max_duration_seconds: null

model:
  wavlm_model_name: microsoft/wavlm-base
  num_labels: 4
  pooling: mean
  dropout: 0.2
  freeze_wavlm: true
  unfreeze_last_n_layers: 0

training:
  device: auto
  batch_size: 16
  eval_batch_size: 16
  max_epochs: 100
  learning_rate_classifier: 0.0001
  learning_rate_wavlm: 0.00001
  weight_decay: 0.01
  scheduler: cosine
  warmup_ratio: 0.1
  gradient_clip: 1.0
  num_workers: 0
  progress_bar: true

wandb:
  use_wandb: true
  project: conversational-SER
  run_name: wavlm_baseline_no_mal_no_tim
  entity: null
  mode: online
