experiment_name: wavlm_mal_fair_3phase
output_dir: results/fair_3phase/wavlm_mal
seed: 42

dataset:
  name: iemocap
  iemocap_root: iemocap
  auto_download: true
  kaggle_dataset: sangayb/iemocap
  meld_root: data/meld-dataset
  meld_auto_download: true
  meld_kaggle_dataset: zaber666/meld-dataset
  test_session: 5
  validation_ratio: 0.1
  sampling_rate: 16000
  max_duration_seconds: null

model:
  wavlm_model_name: microsoft/wavlm-base
  num_labels: 4
  freeze_wavlm: true
  unfreeze_last_n_layers: 0
  memory_dim: 128
  temporal_feature_dim: 16
  use_temporal_features: false
  temporal_feature_mode: zero
  dropout: 0.2

precompute:
  enabled: true
  pooling: mean
  cache_path: results/wavlm_shared/cache/wavlm_mean_embeddings.pt
  force_recompute: false
  batch_size: 16

cross_session:
  enabled: false
  test_sessions: [1, 2, 3, 4, 5]
  run_name: null

training:
  device: auto
  batch_size: 16
  eval_batch_size: 16
  max_epochs: 70
  wavlm_batch_size: 4
  eval_wavlm_batch_size: 4
  learning_rate: 0.0001
  learning_rate_classifier: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_ratio: 0.1
  gradient_clip: 1.0
  use_class_weights: false
  num_workers: 0
  progress_bar: false

wandb:
  use_wandb: true
  project: conversational-SER
  run_name: wavlm_mal_fair_3phase
  entity: null
  mode: online
