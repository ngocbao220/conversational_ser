experiment_name: hubert_baseline_loso
output_dir: results/backbone_generalization_loso/hubert_baseline
seed: 42

dataset:
  name: iemocap
  iemocap_root: data/iemocap
  auto_download: true
  kaggle_dataset: sangayb/iemocap
  test_session: 5
  validation_ratio: 0.1
  sampling_rate: 16000
  max_duration_seconds: null

model:
  wavlm_model_name: facebook/hubert-base-ls960
  num_labels: 4
  freeze_wavlm: true
  unfreeze_last_n_layers: 0
  dropout: 0.2

precompute:
  enabled: true
  pooling: mean
  cache_path: results/backbone_shared/cache/hubert_base_ls960_mean_embeddings.pt
  force_recompute: false
  batch_size: 16

cross_session:
  enabled: true
  test_sessions: [1, 2, 3, 4, 5]
  run_name: null

training:
  device: auto
  batch_size: 16
  eval_batch_size: 16
  max_epochs: 150
  wavlm_batch_size: 4
  eval_wavlm_batch_size: 4
  learning_rate: 0.0001
  learning_rate_classifier: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_ratio: 0.1
  gradient_clip: 1.0
  num_workers: 0
  progress_bar: false

wandb:
  use_wandb: true
  project: conversational-SER
  run_name: hubert_baseline_loso
  entity: null
  mode: online
