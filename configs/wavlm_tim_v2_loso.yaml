experiment_name: wavlm_tim_v2_recommended_features_loso
output_dir: results/ablation_model_loso/wavlm_tim_v2_recommended
seed: 42

dataset:
  name: iemocap
  iemocap_root: data/iemocap
  auto_download: true
  kaggle_dataset: sangayb/iemocap
  test_session: 5
  validation_ratio: 0.1
  sampling_rate: 16000
  max_duration_seconds: null

model:
  wavlm_model_name: microsoft/wavlm-base
  num_labels: 4
  freeze_wavlm: true
  unfreeze_last_n_layers: 0
  use_mal_memory: true
  use_temporal_features: true
  temporal_feature_mode: real
  temporal_input_mode: real
  temporal_feature_set: recommended_v2
  disabled_temporal_feature_groups: []
  temporal_shuffle_seed: 0
  temporal_feature_dim: 36
  temporal_emb_dim: 64
  memory_dim: 128
  residual_gate_init: 0.0
  immediate_gap_threshold: 0.1
  short_gap_threshold: 0.3
  long_gap_threshold: 1.0
  overlap_threshold: 0.05
  strong_overlap_ratio_threshold: 0.30
  density_window_seconds: 10.0
  dropout: 0.2

precompute:
  enabled: true
  pooling: mean
  cache_path: results/wavlm_shared/cache/wavlm_mean_embeddings.pt
  force_recompute: false
  batch_size: 16

cross_session:
  enabled: true
  test_sessions: [1, 2, 3, 4, 5]
  run_name: null

training:
  device: auto
  batch_size: 16
  eval_batch_size: 16
  max_epochs: 150
  wavlm_batch_size: 4
  eval_wavlm_batch_size: 4
  learning_rate: 0.0001
  learning_rate_classifier: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_ratio: 0.1
  gradient_clip: 1.0
  use_class_weights: false
  num_workers: 0
  progress_bar: false

analysis:
  strong_overlap_threshold: 0.25

wandb:
  use_wandb: true
  project: conversational-SER
  run_name: wavlm_tim_v2_recommended_features_loso
  entity: null
  mode: online
